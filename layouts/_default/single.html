{{ define "main" }}
<article class="article">
  <a class="back" href="/">← 최근 기록</a>
  <header>
    <div class="meta">{{ .Date.Format "2006.01.02" }} · {{ with index .Params.categories 0 }}{{ . }}{{ end }}</div>
    <h1>{{ .Title }}</h1>
    <p class="lead">{{ .Description }}</p>
  </header>
  <div class="content">{{ .Content }}</div>
</article>
{{ end }}
